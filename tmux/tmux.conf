# ── General ──────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g default-command "/usr/bin/bash -i"
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g set-clipboard on
set -sg escape-time 10
set -g focus-events on
set -g status-interval 1
set -g display-time 2000
set -g display-panes-time 2000

# ── Prefix ───────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Splits ───────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Vim-style pane navigation ────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Resize panes ─────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Windows ──────────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"
bind n next-window
bind p previous-window

# ── Navigation shortcuts ────────────────────────────────
# Edit pane layout for development workflow
bind = select-layout tile
bind ! select-layout even-horizontal
bind _ select-layout even-vertical
bind o select-layout main-horizontal

# ── Reload config ────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# ── Vi copy mode ─────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard || xsel -bi"
bind -T copy-mode-vi Y send-keys -X copy-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# ── Everforest Theme ─────────────────────────────────────
set -g status-position top
set -g status-style "bg=#2d353b,fg=#d3c6aa"

set -g status-left-length 40
set -g status-right-length 80
set -g status-left "#[bg=#a7c080,fg=#2d353b,bold] #S #[bg=#2d353b] #[fg=#7a8478]#{session_windows} windows"
set -g status-right "#[fg=#7a8478]│ #[fg=#d699b6]%H:%M:%S #[fg=#7a8478]│ #[fg=#7fbbb3]%d-%b #[fg=#7a8478]│ #[bg=#a7c080,fg=#2d353b,bold] #h "

setw -g window-status-format "#[fg=#7a8478] #I:#W#F "
setw -g window-status-current-format "#[bg=#3d484d,fg=#a7c080,bold] #I:#W#F "
setw -g window-status-separator ""

set -g pane-border-style "fg=#3d484d"
set -g pane-active-border-style "fg=#a7c080"
set -g message-style "bg=#3d484d,fg=#d3c6aa"
set -g message-command-style "bg=#3d484d,fg=#d3c6aa"
set -g mode-style "bg=#3d484d,fg=#d3c6aa"

# ── Pane numbers display ────────────────────────────────
set -g pane-border-status bottom
set -g pane-border-format "#[bg=#3d484d,fg=#a7c080] #{pane_index} #[default]"

# ── TPM (Tmux Plugin Manager) ───────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-copycat'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'
set -g @resurrect-capture-pane-contents 'on'

# ── Session quick navigation ─────────────────────────────
bind s choose-session
bind w choose-window
bind D if-shell "tmux has-session -t dev 2>/dev/null" "switch-client -t dev" "new-session -d -s dev -c '#{HOME}/dab' \; switch-client -t dev"

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
